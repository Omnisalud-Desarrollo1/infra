# Traefik dynamic configuration — middlewares
http:
  middlewares:
    compress:
      compress:
        excludedContentTypes:
          - image/png
          - image/jpeg
          - image/gif
          - image/webp

    rate-limit-general:
      rateLimit:
        average: 100
        burst: 50

    rate-limit-auth:
      rateLimit:
        average: 5
        burst: 3

    body-limit:
      buffering:
        maxRequestBodyBytes: 52428800

    retry:
      retry:
        attempts: 3
        initialInterval: 100ms

    assets-cache:
      headers:
        customResponseHeaders:
          Cache-Control: "public, max-age=31536000, immutable"
