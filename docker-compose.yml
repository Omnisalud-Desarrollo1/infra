  # ========================================
  # CONTROL DE COSTOS (app3)
  # ========================================
  app3-costos:
    build:
      context: ../Control-Costos-y-Negociaciones
      dockerfile: Dockerfile
      args:
        VITE_SSO_ENABLED: "true"
        VITE_APP_PATH_PREFIX: /app3
        VITE_API_BASE_URL: /app3
    container_name: app3-costos
    restart: unless-stopped
    logging: *logging
    deploy:
      resources: *resources-medium
    environment:
      PORT: 3001
      SSO_ENABLED: "true"
      <<: *jwt-common
      <<: *ssl-env
      COOKIE_ACCESS_TOKEN_NAME: sso_access_token
      MAIN_APP_URL: /
      APP_PATH_PREFIX: /app3
      DB_HOST: ${MYSQL_HOST}
      DB_PORT: ${MYSQL_PORT:-3306}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      GLOBAL_AUTH_DB_HOST: ${MYSQL_HOST}
      GLOBAL_AUTH_DB_NAME: omn_core_global
      GLOBAL_AUTH_DB_USER: ${MYSQL_USER}
      GLOBAL_AUTH_DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_APP_SCHEMA: omn_ng_control_costos_rn
      DB_STAGING_SCHEMA: omn_core_global
      DB_CITY_SCHEMA: omn_core_global
      DB_SERVICE_SCHEMA: omn_core_global
      DB_SERVICE_NAME_SCHEMA: omn_core_global
      CORS_ORIGINS: ""
    volumes:
      - ./ssl:/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app3.rule=PathPrefix(`/app3`)"
      - "traefik.http.routers.app3.entrypoints=web"
      - "traefik.http.middlewares.app3-strip.stripprefix.prefixes=/app3"
      - "traefik.http.routers.app3.middlewares=app3-strip,compress@file"
      - "traefik.http.services.app3.loadbalancer.server.port=3001"
    depends_on:
      traefik:
        condition: service_started
    networks:
      - omni_net

networks:
  omni_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
