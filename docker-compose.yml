# ============================================================
# ECOSISTEMA COMPLETO - docker-compose.yml
# ============================================================
# Orquestra todos los servicios del ecosistema Omnisalud Digital:
#   - Traefik reverse proxy (path-based routing + HTTPS)
#   - Portal-Corporativo-Omnisalud (main SSO app)
#   - Desarrollo_Asistencial (app1)
#   - Desarrollo_Comercial (app2)
#   - Negociaciones_control_costo (app3)
#   - Ngrok (testing)
#
# USO:
#   cp .env.example .env        # editar credenciales
#   docker compose up -d        # stack completo
#   docker compose --profile ngrok up -d  # con ngrok
#
# DOMINIO PRODUCCION: portalcorporativo.omnisalud.co
# ============================================================

x-mysql-env: &mysql-env
  MYSQL_HOST: ${MYSQL_HOST}
  MYSQL_PORT: ${MYSQL_PORT:-3306}
  MYSQL_USER: ${MYSQL_USER}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD}

x-jwt-common: &jwt-common
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  COOKIE_ACCESS_TOKEN_NAME: sso_access_token

x-ssl-env: &ssl-env
  DB_SSL_CA: ${DB_SSL_CA}
  DB_SSL_CERT: ${DB_SSL_CERT}
  DB_SSL_KEY: ${DB_SSL_KEY}

x-app-env: &app-env
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  COOKIE_ACCESS_TOKEN_NAME: sso_access_token
  MYSQL_HOST: ${MYSQL_HOST}
  MYSQL_PORT: ${MYSQL_PORT:-3306}
  MYSQL_USER: ${MYSQL_USER}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD}

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-resources-small: &resources-small
  limits:
    cpus: '0.5'
    memory: 256M
  reservations:
    cpus: '0.1'
    memory: 64M

x-resources-medium: &resources-medium
  limits:
    cpus: '1.0'
    memory: 512M
  reservations:
    cpus: '0.25'
    memory: 128M

services:
  # ========================================
  # TRAEFIK - Reverse Proxy
  # ========================================
  traefik:
    image: traefik
    container_name: traefik
    restart: unless-stopped
    logging: *logging
    deploy:
      resources: *resources-small
    command:
      - "--api.dashboard=true"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--accesslog=true"
      - "--accesslog.filepath=/dev/stdout"
      - "--accesslog.format=json"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Timeouts
      - "--entrypoints.web.transport.respondingTimeouts.idleTimeout=180"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=60"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=60"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=180"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=60"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=60"
      # Let's Encrypt (staging para pruebas; quitar caServer para prod)
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@omnisalud.co}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caServer=${LETSENCRYPT_CA:-https://acme-staging-v02.api.letsencrypt.org/directory}"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "880:80"
      - "4443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/letsencrypt:/letsencrypt"
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - omni_net

  # ========================================
  # PORTAL-CORPORATIVO - Backend (FastAPI)
  # ========================================
  portal-auth:
    build:
      context: ../Portal-Corporativo-Omnisalud/auth-server
      dockerfile: Dockerfile
    container_name: portal-auth
    restart: unless-stopped
    logging: *logging
    deploy:
      resources: *resources-medium
    environment:
      APP_ENV: ${APP_ENV:-development}
      <<: *app-env
      <<: *ssl-env
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-7200}
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRE_MINUTES:-21600}
      MYSQL_DATABASE: omn_core_global
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: lax
      COOKIE_REFRESH_TOKEN_NAME: sso_refresh_token
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-}
      APP_PORT: 8000
    volumes:
      - ./ssl:/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-auth.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.routers.portal-auth.entrypoints=web"
      - "traefik.http.services.portal-auth.loadbalancer.server.port=8000"
      - "traefik.http.routers.portal-auth.middlewares=rate-limit-general@file,compress@file"
    depends_on:
      traefik:
        condition: service_started
    networks:
      - omni_net

  # ========================================
  # PORTAL-CORPORATIVO - Frontend (React/Vite)
  # ========================================
  portal-frontend:
    build:
      context: ../Portal-Corporativo-Omnisalud/client-app/frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_SERVER_URL: ""
    container_name: portal-frontend
    restart: unless-stopped
    logging: *logging
    deploy:
      resources: *resources-small
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.portal-frontend.entrypoints=web"
      - "traefik.http.routers.portal-frontend.priority=1"
      - "traefik.http.services.portal-frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.portal-frontend.middlewares=compress@file"
    depends_on:
      portal-auth:
        condition: service_started
    networks:
      - omni_net

